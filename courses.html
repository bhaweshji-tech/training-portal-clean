<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Training Portal</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .header-section {
            margin-bottom: 40px;
            text-align: center;
        }
        .back-btn {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .course-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .course-card h3 {
            margin-top: 0;
            color: #222;
        }
        .course-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        .course-link {
            background-color: #0070f3;
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }
        .course-link:hover {
            background-color: #0051a8;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← Back to Categories</a>
        
        <div class="header-section">
            <h1 id="tech-title">Loading Courses...</h1>
            <p>Explore your selected technology courses below.</p>
        </div>

        <div id="loading-text" class="loading">Fetching data from Supabase...</div>
        <div id="course-container" class="course-grid"></div>
    </div>

    <script>
        // STEP 1: Provide your actual Supabase credentials below
        const DB_URL = "https://gsdblteofsongnjdjhpc.supabase.co"; 
        const DB_ANON_KEY = "sb_publishable_u9dNq32zPDAFOO415PArvQ_ljzEEiaC";

        // Fixed Initialization: Using window.supabase to resolve library reference conflict
        const supabaseClient = window.supabase.createClient(DB_URL, DB_ANON_KEY);

        // Get parameters from URL query string (?tech=Docker)
        const urlParams = new URLSearchParams(window.location.search);
        const selectedTech = urlParams.get('tech');

        async function fetchCourses() {
            if (!selectedTech) {
                document.getElementById('tech-title').innerText = "No Technology Selected";
                document.getElementById('loading-text').style.display = 'none';
                return;
            }

            // Immediately apply title update
            document.getElementById('tech-title').innerText = selectedTech + " Courses";

            try {
                // Query table data
                const { data: courses, error } = await supabaseClient
                    .from('trainingdata')
                    .select('title, desc, tech, link')
                    .eq('tech', selectedTech);

                document.getElementById('loading-text').style.display = 'none';

                if (error) {
                    console.error("Database Error:", error);
                    document.getElementById('loading-text').innerText = "Error loading table data: " + error.message;
                    document.getElementById('loading-text').style.display = 'block';
                    return;
                }

                const container = document.getElementById('course-container');

                if (!courses || courses.length === 0) {
                    container.innerHTML = `<p class="loading">No courses found for ${selectedTech} yet.</p>`;
                    return;
                }

                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.innerHTML = `
                        <div>
                            <h3>${course.title}</h3>
                            <p>${course.desc || 'No description provided.'}</p>
                        </div>
                        <a href="${course.link}" target="_blank" class="course-link">View Course</a>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("System connection error:", err);
                document.getElementById('loading-text').innerText = "Failed to connect to Supabase network setup.";
            }
        }

        fetchCourses();
    </script>
</body>
</html>
